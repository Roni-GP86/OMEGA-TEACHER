[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Redirect all API requests to our Netlify serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

# Fallback for Single Page Application routing (React router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
